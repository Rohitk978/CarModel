<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMW Price Predictor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.container {
    background: white;
    width: 650px;
    padding: 30px 40px;
    border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

/* HEADER */
h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #203a43;
}

.subtitle {
    text-align: center;
    color: gray;
    margin-bottom: 25px;
}

/* FORM GRID */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

input, select {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    width: 100%;
    font-size: 14px;
}

/* BUTTON */
button {
    grid-column: span 2;
    padding: 12px;
    background: #203a43;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2c5364;
}

/* RESULT CARD */
.result-card {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    font-size: 20px;
    display: none;
}

.success {
    background: #e7f7ed;
    color: #0f9d58;
}

.error {
    background: #fdecea;
    color: #d93025;
}

/* LOADER */
.loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #203a43;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    animation: spin 1s linear infinite;
    display: none;
    margin: auto;
    margin-top: 15px;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🚗 BMW Price Predictor</h1>
    <p class="subtitle">Machine Learning Powered Car Valuation</p>

    <form id="predictionForm" class="form-grid">

        <input type="text" name="model" placeholder="Model" required>

        <select name="year" required>
            <option value="">Select Year</option>
            <script>
                const currentYear = new Date().getFullYear();
                for (let y = currentYear; y >= 1980; y--) {
                    document.write(`<option value="${y}">${y}</option>`);
                }
            </script>
        </select>

        <input type="number" name="mileage" placeholder="Mileage (km)" min="0" required>

        <select name="transmission">
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
            <option value="Semi-Auto">Semi-Auto</option>
        </select>

        <select name="fuelType">
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="Hybrid">Hybrid</option>
        </select>

        <input type="number" name="tax" placeholder="Tax" required>
        <input type="number" name="mpg" placeholder="MPG" step="0.1" required>
        <input type="number" name="engineSize" placeholder="Engine Size" step="0.1" required>

        <button type="submit">Predict Price</button>
    </form>

    <div class="loader" id="loader"></div>
    <div id="result" class="result-card"></div>

</div>

<script>
document.getElementById("predictionForm").onsubmit = async function(e) {
    e.preventDefault();

    const loader = document.getElementById("loader");
    const resultBox = document.getElementById("result");

    loader.style.display = "block";
    resultBox.style.display = "none";

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();
    loader.style.display = "none";

    resultBox.style.display = "block";

    if (result.error) {
        resultBox.className = "result-card error";
        resultBox.innerText =  result.error;
    } else {
        resultBox.className = "result-card success";
        resultBox.innerText = "Predicted Price: $" + result.prediction;
    }
};
</script>

</body>
</html>
